---
- name: "[{{ service_name }}] Создаём конфиг"
  vars:
    ansible_python_interpreter: /opt/ansible-venvs/docker/bin/python
    config_file: "{{ lookup('template', service_name ~ '/' ~ config_item ~ '.j2') }}"
  community.docker.docker_config:
    name: "{{ config_item }}"
    data: "{{ config_file | b64encode }}"
    labels:
      config: "{{ config_file | hash('sha1') }}"
    data_is_b64: true
    state: present
