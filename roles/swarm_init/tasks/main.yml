- name: Сохранение токенов
  ansible.builtin.set_fact:
    swarm_init_token_manager: "{{ swarm_init_token.swarm_facts.JoinTokens.Manager }}"
    swarm_init_token_worker: "{{ swarm_init_token.swarm_facts.JoinTokens.Worker }}"
    cacheable: true
