---
- name: Инициализация swarm
  vars:
    ansible_python_interpreter: /opt/ansible-venvs/docker/bin/python
  community.docker.docker_swarm:
    state: present
    advertise_addr: "{{ advertise_addr }}"
  register: swarm_init_token

