---
- name: Preconfig
  hosts: cluster
  become: true

  pre_tasks:
    - name: Дождаться завершения cloud-init, если он запущен
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Ждать пока apt заблокированы
      ansible.builtin.shell: |
        while fuser /var/lib/apt/lists/lock \
                    /var/lib/dpkg/lock-frontend \
                    /var/lib/dpkg/lock \
                    /var/cache/apt/archives/lock >/dev/null 2>&1; do
          sleep 5
        done
      changed_when: false

    - name: Записать архитектуру в переменную
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

  tasks:
    - name: Установка Docker
      block:
        - name: Добавление universe
          ansible.builtin.apt_repository:
            repo: "deb http://ports.ubuntu.com/ubuntu-ports/ {{ ansible_facts['distribution_release'] }} universe"
            state: present

        - name: Установка дополнительных пакетов
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
            state: present
            update-cache: true
            cache_valid_time: 86400

        - name: Создание папки keyrings
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: Добавление ключа Docker
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/ubuntu/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

        - name: Установка стабильного репозитория
          ansible.builtin.apt_repository:
            repo: >
              deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
              https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }}
              stable
            state: present
            update-cache: true
            filename: docker

        - name: Установка пакетов для Docker
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            update-cache: true

        - name: Проверка что Docker установлен и перезагружен
          ansible.builtin.service:
            name: docker
            state: restarted
            enabled: true

    - name: Завершение установки
      become: true
      block:
        - name: Добавление пользователя в группу Docker
          ansible.builtin.user:
            name: "{{ ansible_user }}"
            groups: docker
            append: true

        - name: Перезагрузка
          ansible.builtin.reboot:
